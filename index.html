<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#007600">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="drzjFreeCell">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>drzjFreeCell</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icon.svg">
    <link rel="stylesheet" href="styles.css?v=16">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div>
            <h1>drzjFreeCell</h1>
            <p id="gameInfo">Jogo novo</p>
          </div>
        </div>

        <div class="stats" aria-live="polite">
          <span>Jogo <strong id="dealNumber">#</strong></span>
          <span>Tempo <strong id="timer">00:00</strong></span>
          <span>Cartas <strong id="cardsLeft">52</strong></span>
          <span>Recorde <strong id="bestTime">--:--</strong></span>
          <span>Média 5 <strong id="avgTime">--:--</strong></span>
        </div>

        <div class="quick-actions">
          <button class="speed-btn autoplay-only" id="slowerBtn" type="button" hidden>&lt;&lt;</button>
          <button class="quick-undo" id="quickUndoBtn" type="button">Desfazer</button>
          <button class="speed-btn autoplay-only" id="fasterBtn" type="button" hidden>&gt;&gt;</button>
        </div>

        <details class="info-menu" id="infoMenu">
          <summary>Info</summary>
          <div class="info-panel">
            <strong>Informações</strong>
            <span>Jogo <b id="infoDeal">#</b></span>
            <span>Movimentos <b id="infoMoves">0</b></span>
            <span>Concluídos <b id="infoFinished">0</b></span>
            <span>Dificuldade <b id="infoDifficulty">Aleatório total</b></span>
            <span>Recorde <b id="infoBest">--:--</b></span>
            <span>Média 5 <b id="infoAverage">--:--</b></span>
          </div>
        </details>

        <details class="menu" id="menu">
          <summary id="menuSummary">Menu</summary>
          <div class="menu-panel">
            <button id="newGameBtn" type="button">Novo jogo</button>
            <label class="menu-row">
              Dificuldade
              <select id="difficultySelect">
                <option value="random">Aleatório total</option>
                <option value="level1">Nível 1 fácil</option>
                <option value="level2">Nível 2 médio</option>
                <option value="level3">Nível 3 difícil</option>
              </select>
            </label>
            <button id="selectGameBtn" type="button">Selecionar jogo</button>
            <button id="restartBtn" type="button">Reiniciar este jogo</button>
            <button class="secret-option" id="autoplayBtn" type="button" hidden>Autoplay</button>
            <label class="menu-row">
              <input id="autoPromoteToggle" type="checkbox">
              Auto-promoção
            </label>
            <label class="menu-row">
              <input id="nightModeToggle" type="checkbox">
              Modo noturno
            </label>
            <label class="menu-row">
              Deck
              <select id="deckSelect">
                <option value="traditional">Tradicional</option>
                <option value="ju">Ju</option>
              </select>
            </label>
          </div>
        </details>
      </header>

      <main class="table" id="table" aria-label="Mesa de FreeCell">
        <section class="top-row" aria-label="Células livres e fundações">
          <div class="zone freecells" id="freecells" aria-label="Células livres"></div>
          <div class="zone foundations" id="foundations" aria-label="Fundações"></div>
        </section>

        <section class="cascades" id="cascades" aria-label="Colunas do jogo"></section>
      </main>

      <div class="status-line" id="statusLine" role="status">Toque em uma carta ou sequência para mover.</div>
    </div>

    <div class="win-overlay" id="winOverlay" hidden>
      <div class="win-card">
        <div class="sparkles">✦ ✧ ✦</div>
        <h2>Vitória!</h2>
        <p id="winText"></p>
        <button id="winNewGameBtn" type="button">Novo jogo</button>
      </div>
    </div>

    <script src="app.js?v=19"></script>
    <script>
      if ("serviceWorker" in navigator && location.protocol !== "file:") {
        navigator.serviceWorker.getRegistrations()
          .then((registrations) => registrations.forEach((registration) => registration.unregister()));
      }
      if ("caches" in window) {
        caches.keys().then((keys) => keys.forEach((key) => caches.delete(key)));
      }
    </script>
  </body>
</html>
